apiVersion: 1
contactPoints:
  - orgId: 1
    name: Discord
    receivers:
      - uid: discord-main
        type: discord
        settings:
          url: ${DISCORD_WEBHOOK_URL}
          message: |
            🚨 **{{ .CommonLabels.alertname }}**
            Severity: {{ .CommonLabels.severity }}
            {{ range .Alerts }}
            • {{ .Annotations.summary }}
            {{ .Annotations.description }}
            {{ end }}
        disableResolveMessage: false
