admin:
  existingSecret: grafana-admin
  userKey: admin-user
  passwordKey: admin-password

persistence:
  enabled: true
  size: 1Gi
  storageClassName: local-path

resources:
  requests: { cpu: 100m, memory: 128Mi }
  limits:   { cpu: 300m, memory: 256Mi }

service:
  type: NodePort
  nodePort: 30000

datasources:
  datasources.yaml:
    apiVersion: 1
    datasources:
      - name: Loki
        type: loki
        uid: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000

dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: sip2026
        orgId: 1
        folder: SIP 2026
        type: file
        disableDeletion: false
        options:
          path: /var/lib/grafana/dashboards/sip2026

envFromSecret: discord-webhook

extraConfigmapMounts:
  - name: scraper-overview-dashboard
    configMap: scraper-overview-dashboard
    mountPath: /var/lib/grafana/dashboards/sip2026
    readOnly: true
  - name: scraper-alert-rules
    configMap: scraper-alerting
    mountPath: /etc/grafana/provisioning/alerting/alert-rules.yaml
    subPath: alert-rules.yaml
    readOnly: true
  - name: scraper-contact-point
    configMap: scraper-alerting
    mountPath: /etc/grafana/provisioning/alerting/contact-point.yaml
    subPath: contact-point.yaml
    readOnly: true
  - name: scraper-notification-policy
    configMap: scraper-alerting
    mountPath: /etc/grafana/provisioning/alerting/notification-policy.yaml
    subPath: notification-policy.yaml
    readOnly: true
