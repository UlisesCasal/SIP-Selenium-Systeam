# ECK Operator Helm values
# Install with: helm install eck-operator eck/eck-operator -f eck-operator-values.yaml

# Default values, can be customized
operatorNamespace: elastic-system
createClusterScopedResources: true
createOperatorNamespace: true
installCRDs: true
webhook:
  enabled: true
  certManager:
    enabled: false
