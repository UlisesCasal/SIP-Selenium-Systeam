# ECK Operator Helm values — v2.16.x
# Referencia: https://www.elastic.co/docs/deploy-manage/deploy/cloud-on-k8s/configure-eck
#
# El chart elastic/eck-operator despliega el operator como StatefulSet
# (NO como Deployment). El nombre del StatefulSet es "elastic-operator".

# Habilitar la gestión de los CRDs desde el chart (instalación self-contained)
manageCrds: true

# Namespace donde el operator vigilará recursos. "\"\"" = todos los namespaces
managedNamespaces: []

# Recursos del pod del operator
resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m

# Logs en formato JSON para que Fluent Bit los parsee correctamente
config:
  logVerbosity: "0"

# No usar webhook de validación por defecto (simplifica entorno TP sin cert-manager)
webhook:
  enabled: true

# Telemetría deshabilitada en entorno TP/académico
telemetry:
  disabled: true
