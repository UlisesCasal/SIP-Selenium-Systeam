# Fluent Bit Helm values for scraper logs
# Install with: helm install fluent-bit fluent/fluent-bit -f fluent-bit-values.yaml

image:
  repository: fluent/fluent-bit
  tag: "2.1.0"

serviceAccount:
  create: true

rbac:
  create: true

daemonSet:
  enabled: true

config:
  inputs: |
    [INPUT]
        Name tail
        Path /var/log/scraper/*.log
        Tag scraper.*
        Refresh_Interval 5
        Rotate_Wait 5
        Skip_Long_Lines On

  outputs: |
    [OUTPUT]
        Name es
        Match scraper.*
        Host elasticsearch-es-http.elastic.svc.cluster.local
        Port 9200
        Index scraper
        Type scraper
        Replace_Dots On
        Logstash_Format On
        Logstash_Prefix scraper
        Retry_Limit 5

  filters: |
    [FILTER]
        Name record_modifier
        Match scraper.*
        Record hostname ${HOSTNAME}
        Record cluster scraper-cluster
