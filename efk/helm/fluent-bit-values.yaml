image:
  repository: fluent/fluent-bit
  tag: 3.2.4

resources:
  requests: { cpu: 50m, memory: 64Mi }
  limits: { cpu: 200m, memory: 128Mi }

# Tolera taints del control plane (k3s single-node)
tolerations:
  - effect: NoSchedule
    operator: Exists

# RBAC para leer pod metadata via API
serviceAccount:
  create: true
rbac:
  create: true

# Necesita acceder al secret de ES para autenticarse
extraVolumes:
  - name: es-certs
    secret:
      secretName: scraper-es-http-certs-public
extraVolumeMounts:
  - name: es-certs
    mountPath: /etc/fluent-bit/certs
    readOnly: true

env:
  - name: ES_PASSWORD
    valueFrom:
      secretKeyRef:
        name: scraper-es-elastic-user
        key: elastic

config:
  service: |
    [SERVICE]
        Daemon         Off
        Flush          5
        Log_Level      info
        Parsers_File   /fluent-bit/etc/parsers.conf
        HTTP_Server    On
        HTTP_Listen    0.0.0.0
        HTTP_Port      2020

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*ml-scraper*.log
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     5MB
        Skip_Long_Lines   On
        Refresh_Interval  10

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Merge_Log           On
        Merge_Log_Key       log_processed
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    # Sólo nos quedamos con pods cuyo label app=scraper (igual que Hit #2 de Parte 1)
    [FILTER]
        Name    grep
        Match   kube.*
        Regex   $kubernetes['labels']['app'] ^scraper$

    # Parsea el JSON-line emitido por logging_setup.py (ya estructurado del Hit #3 de Parte 1)
    [FILTER]
        Name         parser
        Match        kube.*
        Key_Name     log
        Parser       json_scraper
        Reserve_Data On
        Preserve_Key Off

  outputs: |
    [OUTPUT]
        Name              es
        Match             kube.*
        Host              scraper-es-http.elastic.svc.cluster.local
        Port              9200
        HTTP_User         elastic
        HTTP_Passwd       ${ES_PASSWORD}
        tls               On
        tls.verify        Off
        Suppress_Type_Name On
        Logstash_Format   On
        Logstash_Prefix   scraper-logs
        Logstash_DateFormat %Y.%m.%d
        Time_Key          @timestamp
        Replace_Dots      On
        Retry_Limit       5

  customParsers: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name         json_scraper
        Format       json
        Time_Key     timestamp
        Time_Format  %Y-%m-%dT%H:%M:%S%z
        Time_Keep    On
