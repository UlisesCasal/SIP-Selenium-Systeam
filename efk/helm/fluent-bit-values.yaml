# Fluent Bit Helm values — fluent/fluent-bit v0.48.x
# Objetivo: recolectar logs de todos los pods y enviarlos a Elasticsearch (ECK)
# Los logs de los scrapers deben tener campo "log" parseado como JSON

# ── Imagen ─────────────────────────────────────────────────────────────────────
image:
  repository: cr.fluentbit.io/fluent/fluent-bit
  # La versión del chart 0.48.x trae Fluent Bit ~3.2.x — no fijar tag aquí
  # para que coincida con la versión del chart
  pullPolicy: IfNotPresent

# ── Service Account ────────────────────────────────────────────────────────────
serviceAccount:
  create: true
  name: fluent-bit

# ── Toleraciones: que el DaemonSet corra en todos los nodos (incluido master) ──
tolerations:
  - key: node-role.kubernetes.io/master
    operator: Exists
    effect: NoSchedule
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule

# ── Recursos del DaemonSet ─────────────────────────────────────────────────────
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

# ── Configuración principal de Fluent Bit ──────────────────────────────────────
config:
  # SERVICE: comportamiento global del agente
  service: |
    [SERVICE]
        Flush        5
        Log_Level    info
        Daemon       Off
        Parsers_File parsers.conf
        HTTP_Server  On
        HTTP_Listen  0.0.0.0
        HTTP_Port    2020

  # INPUT: leer logs de todos los contenedores vía tail del CRI
  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        # Excluir los propios pods del stack EFK para evitar ruido circular
        Exclude_Path      /var/log/containers/*fluent-bit*,/var/log/containers/*elastic*,/var/log/containers/*kibana*
        Parser            cri
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     10MB
        Skip_Long_Lines   On
        Refresh_Interval  10
        Ignore_Older      1m

  # FILTER 1: enriquecer con metadata de Kubernetes (namespace, pod, container, labels)
  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           On
        Merge_Log_Key       log_processed
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude On
        Annotations         Off
        Labels              On

    [FILTER]
        Name    nest
        Match   kube.*
        Operation lift
        Nested_under kubernetes
        Add_prefix   k8s_

  # OUTPUT: enviar a Elasticsearch (ECK) con autenticación TLS
  # La password se lee desde el Secret montado como variable de entorno
  outputs: |
    [OUTPUT]
        Name            es
        Match           kube.*
        Host            elastic-es-http.elastic.svc.cluster.local
        Port            9200
        HTTP_User       elastic
        HTTP_Passwd     ${ES_PASSWORD}
        tls             On
        tls.verify      Off
        Logstash_Format On
        Logstash_Prefix scraper
        Time_Key        @timestamp
        Suppress_Type_Name On
        Retry_Limit     3
        Replace_Dots    On
        Trace_Error     On
        Buffer_Size     False

  # PARSERS: CRI (formato de containerd/k3s) y JSON
  customParsers: |
    [PARSER]
        Name        cri
        Format      regex
        Regex       ^(?<time>[^ ]+) (?<stream>stdout|stderr) (?<logtag>[^ ]*) (?<log>.*)$
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

    [PARSER]
        Name        json
        Format      json
        Time_Key    time
        Time_Format %Y-%m-%dT%H:%M:%S.%L%z

# ── Volúmenes: acceso a los logs del nodo ─────────────────────────────────────
volumeMounts:
  - name: varlog
    mountPath: /var/log
  - name: varlibdockercontainers
    mountPath: /var/lib/docker/containers
    readOnly: true

volumes:
  - name: varlog
    hostPath:
      path: /var/log
  - name: varlibdockercontainers
    hostPath:
      path: /var/lib/docker/containers

# ── Secret de la password de Elasticsearch ────────────────────────────────────
# La password la inyectamos como variable de entorno desde el Secret de ECK.
# Esto evita hardcodear credenciales en el values.yaml.
envFrom:
  - secretRef:
      name: fluent-bit-es-credentials

# ── Liveness y readiness probe (endpoint HTTP del agente) ─────────────────────
livenessProbe:
  httpGet:
    path: /
    port: 2020
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /api/v1/metrics/prometheus
    port: 2020
  initialDelaySeconds: 10
  periodSeconds: 5
