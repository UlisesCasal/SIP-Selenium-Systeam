apiVersion: batch/v1
kind: CronJob
metadata:
  name: scraper-hourly
  namespace: sip-selenium
spec:
  schedule: "0 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      backoffLimit: 4
      template:
        spec:
          restartPolicy: OnFailure
          initContainers:
          - name: wait-for-postgres
            image: postgres:16-alpine
            command:
              - sh
              - -c
              - |
                until nc -z postgres 5432; do
                  echo "Esperando a que el puerto 5432 de postgres responda..."
                  sleep 2
                done
                echo "Postgres aceptando conexiones!"
          containers:
          - name: scraper
            image: ml-scraper:latest
            imagePullPolicy: Never
            command:
              - node
              - src/scrapers/mercadolibre.js
            env:
              - name: MIGRATIONS_DIR
                value: /app/migrations
              - name: HEADLESS
                value: "true"
            envFrom:
              - configMapRef:
                  name: scraper-config
              - secretRef:
                  name: postgres-secret
            volumeMounts:
              - mountPath: /app/output
                name: output
              - mountPath: /app/migrations
                name: migrations
                readOnly: true
          volumes:
          - name: output
            persistentVolumeClaim:
              claimName: scraper-output
          - name: migrations
            configMap:
              defaultMode: 420
              name: migrations-config