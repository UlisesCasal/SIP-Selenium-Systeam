name: HIT4

on:
  push:
    paths:
      - 'HIT4/**'
      - '.github/workflows/hit4.yml'
  pull_request:
    paths:
      - 'HIT4/**'
      - '.github/workflows/hit4.yml'
  workflow_dispatch:

jobs:
  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-and-scrape:
    name: Test and Scrape (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox]
    defaults:
      run:
        working-directory: HIT4
    env:
      BROWSER: ${{ matrix.browser }}
      HEADLESS: 'true'
      RESULT_LIMIT: '10'
      MAX_RETRIES: '2'
      APPLY_FILTERS: 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: HIT4/package-lock.json
      - name: Install dependencies
        run: npm ci
      - uses: browser-actions/setup-chrome@v1
        if: matrix.browser == 'chrome'
      - uses: browser-actions/setup-firefox@v1
        if: matrix.browser == 'firefox'
      - uses: browser-actions/setup-geckodriver@latest
        if: matrix.browser == 'firefox'
      - name: Run unit tests
        run: npm run test:unit
      - name: Run integration tests
        run: RUN_E2E=true RESULT_LIMIT=3 PRODUCTS="bicicleta rodado 29" npm run test:integration
      - name: Execute scraper
        run: npm run scrape:headless
      - name: Validate JSON schema
        run: npm run validate
      - name: Upload scraper artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hit4-${{ matrix.browser }}-artifacts
          path: |
            HIT4/output/*.json
            HIT4/logs/*.log
