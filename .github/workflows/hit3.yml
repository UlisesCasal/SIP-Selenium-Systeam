name: HIT3 — Filters + Screenshot

on:
  push:
    paths:
      - 'HIT3/**'
      - '.github/workflows/hit3.yml'
  pull_request:
    paths:
      - 'HIT3/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: HIT3

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # 1. Secret detection
  # ────────────────────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────────────────────
  # 2. Unit tests (sin browser)
  # ────────────────────────────────────────────────────────────────────────────
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: gitleaks
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HIT3/package-lock.json
      - run: npm ci
      - run: npm run test:unit

  # ────────────────────────────────────────────────────────────────────────────
  # 3. Chrome — filtros + screenshot + tests
  # ────────────────────────────────────────────────────────────────────────────
  test-chrome:
    name: Chrome — Filters + Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HIT3/package-lock.json
      - run: npm ci
      - uses: browser-actions/setup-chrome@v1

      - name: Scrape + Filters — Chrome headless
        run: npm run scrape:chrome:headless

      - name: Tests — Chrome
        run: npm run test:chrome

      - name: Upload artifacts (Chrome)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-hit3-chrome
          path: |
            HIT3/results/
            HIT3/screenshots/
            HIT3/logs/

  # ────────────────────────────────────────────────────────────────────────────
  # 4. Firefox — filtros + screenshot + tests
  # ────────────────────────────────────────────────────────────────────────────
  test-firefox:
    name: Firefox — Filters + Tests
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HIT3/package-lock.json
      - run: npm ci
      - uses: browser-actions/setup-firefox@v1
      - uses: browser-actions/setup-geckodriver@latest

      - name: Scrape + Filters — Firefox headless
        run: npm run scrape:firefox:headless

      - name: Tests — Firefox
        run: npm run test:firefox

      - name: Upload artifacts (Firefox)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-hit3-firefox
          path: |
            HIT3/results/
            HIT3/screenshots/
            HIT3/logs/

  # ────────────────────────────────────────────────────────────────────────────
  # 5. Publicar screenshots en GitHub Pages (solo main)
  # ────────────────────────────────────────────────────────────────────────────
  publish-report:
    name: Publish GitHub Pages
    runs-on: ubuntu-latest
    needs: [test-chrome, test-firefox]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-hit3-chrome
          path: pages/hit3/chrome

      - name: Download Firefox artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-hit3-firefox
          path: pages/hit3/firefox

      - name: Generate index
        run: |
          mkdir -p pages/hit3
          cat > pages/hit3/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <title>HIT #3 — Filtros</title>
            <style>
              body { font-family: system-ui,sans-serif; padding:2rem; max-width:900px; margin:auto; }
              img  { max-width:100%; border:1px solid #ddd; border-radius:4px; margin:1rem 0; }
            </style>
          </head>
          <body>
            <h1>HIT #3 — Screenshots con filtros aplicados</h1>
            <h2>Chrome</h2>
            <a href="chrome/screenshots/">Ver screenshots Chrome</a>
            <h2>Firefox</h2>
            <a href="firefox/screenshots/">Ver screenshots Firefox</a>
          </body>
          </html>
          EOF

      - uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
          keep_files: true
