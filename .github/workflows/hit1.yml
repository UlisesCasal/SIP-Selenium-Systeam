name: HIT1 — MercadoLibre Scraper

on:
  push:
    paths:
      - 'HIT1/**'
      - '.github/workflows/hit1.yml'
  pull_request:
    paths:
      - 'HIT1/**'
  workflow_dispatch:

defaults:
  run:
    working-directory: HIT1

jobs:
  # ────────────────────────────────────────────────────────────
  # 1. Secret detection — falla el pipeline si hay secrets hardcodeados
  # ────────────────────────────────────────────────────────────
  gitleaks:
    name: Secret Detection (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ────────────────────────────────────────────────────────────
  # 2. Tests + Scraping en Chrome (headless)
  # ────────────────────────────────────────────────────────────
  scrape-chrome:
    name: Scrape Chrome (headless)
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HIT1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome
        uses: browser-actions/setup-chrome@v1

      - name: Run scraper — Chrome headless
        run: npm run scrape:chrome:headless

      - name: Run tests — Chrome
        run: BROWSER=chrome npm test

      - name: Upload results (Chrome)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-chrome
          path: |
            HIT1/results/
            HIT1/screenshots/
            HIT1/logs/

  # ────────────────────────────────────────────────────────────
  # 3. Tests + Scraping en Firefox (headless)
  # ────────────────────────────────────────────────────────────
  scrape-firefox:
    name: Scrape Firefox (headless)
    runs-on: ubuntu-latest
    needs: gitleaks

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: HIT1/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Firefox
        uses: browser-actions/setup-firefox@v1

      - name: Install geckodriver
        uses: browser-actions/setup-geckodriver@latest

      - name: Run scraper — Firefox headless
        run: npm run scrape:firefox:headless

      - name: Run tests — Firefox
        run: BROWSER=firefox npm test

      - name: Upload results (Firefox)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-firefox
          path: |
            HIT1/results/
            HIT1/screenshots/
            HIT1/logs/

  # ────────────────────────────────────────────────────────────
  # 4. Publicar reporte en GitHub Pages
  # ────────────────────────────────────────────────────────────
  publish-report:
    name: Publish GitHub Pages Report
    runs-on: ubuntu-latest
    needs: [scrape-chrome, scrape-firefox]
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Chrome results
        uses: actions/download-artifact@v4
        with:
          name: results-chrome
          path: pages/chrome

      - name: Download Firefox results
        uses: actions/download-artifact@v4
        with:
          name: results-firefox
          path: pages/firefox

      - name: Create index page
        run: |
          mkdir -p pages
          cat > pages/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="es">
          <head>
            <meta charset="UTF-8">
            <title>MercadoLibre Scraper — HIT #1</title>
            <style>
              body { font-family: sans-serif; padding: 2rem; max-width: 900px; margin: auto; }
              h1 { color: #333; }
              ul { line-height: 2; }
              a { color: #007bff; }
            </style>
          </head>
          <body>
            <h1>MercadoLibre Scraper — HIT #1</h1>
            <p>Últimos resultados publicados automáticamente por el pipeline de CI/CD.</p>
            <ul>
              <li><a href="chrome/">Resultados Chrome</a></li>
              <li><a href="firefox/">Resultados Firefox</a></li>
            </ul>
          </body>
          </html>
          EOF

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./pages
          publish_branch: gh-pages
