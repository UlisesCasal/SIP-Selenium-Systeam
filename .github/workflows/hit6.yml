name: HIT6 Scraper CI

on:
  push:
    branches: [main, hit6]
  pull_request:
    branches: [main, hit6]
  workflow_dispatch:

jobs:
  secrets:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  test-and-scrape:
    name: Test and Scrape (${{ matrix.browser }})
    runs-on: ubuntu-latest
    needs: secrets
    strategy:
      fail-fast: false
      matrix:
        browser: [chrome, firefox] 
    defaults:
      run:
        working-directory: HIT6
    env:
      BROWSER: ${{ matrix.browser }}
      HEADLESS: 'true'
      RESULT_LIMIT: '10'
      MAX_RETRIES: '2'
      APPLY_FILTERS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: HIT6/package-lock.json
          
      - name: Install dependencies
        run: npm ci
        
      - uses: browser-actions/setup-chrome@v1
        if: matrix.browser == 'chrome'
        
      - uses: browser-actions/setup-firefox@v1
        if: matrix.browser == 'firefox'
        
      - uses: browser-actions/setup-geckodriver@latest
        if: matrix.browser == 'firefox'
        
      - name: Run unit tests with coverage gate
        run: npm run test:unit -- --coverage
        
      - name: Run integration tests
        run: RUN_E2E=true npm run test:integration
        
      - name: Execute scraper
        run: npm run scrape:headless
        
      - name: Upload scraper artifacts and Coverage HTML
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: hit6-${{ matrix.browser }}-artifacts
          path: |
            HIT6/output/*.json
            HIT6/logs/*.log
            HIT6/coverage/